title: "Hodoscope: Unsupervised Monitoring for AI Misbehaviors"
setup: |
  Help me navigate this replicable livepaper. Clone the repo and download the data:
  Run: git clone --recurse-submodules https://github.com/AR-FORUM/hodoscope_livepaper.git && cd hodoscope_livepaper
  Run: pip install -e hodoscope/ && pip install scikit-learn hdbscan
  Run: huggingface-cli download fjzzq2002/hodoscope-paper-data --repo-type dataset --local-dir data
  Experiment scripts are in experiments/. You are now ready to replicate any result.
